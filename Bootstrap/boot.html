<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unique Bootstrap Demo</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

  <!-- Navbar -->
  <nav class="navbar navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo-shadow.png" 
             alt="Bootstrap Logo" width="40" height="32">
        Unique Bootstrap Demo
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container mt-5 text-center">
    <h1 class="mb-4 text-primary">Bootstrap Components Showcase</h1>

    <!-- Logo -->
    <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo-shadow.png" 
         alt="Bootstrap Logo" width="120" class="mb-4">

    <!-- Buttons -->
    <div class="mb-4">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-success btn-sm">Small Success</button>
      <button class="btn btn-warning btn-lg">Large Warning</button>
      <button class="btn btn-info">Info</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-custom">Custom Gradient</button>
    </div>

    <!-- Alerts -->
    <div class="alert alert-success">This is a success alert — looks neat!</div>
    <div class="alert alert-danger">This is a danger alert — be careful!</div>

    <!-- Card -->
    <div class="card mt-4 mx-auto" style="max-width: 400px;">
      <div class="card-body">
        <h5 class="card-title">Bootstrap Card</h5>
        <p class="card-text">Cards are flexible containers with custom styles. You can add text, images, and buttons inside.</p>
        <a href="#" class="btn btn-outline-primary">Learn More</a>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="mt-4">
      <h5>Progress Example</h5>
      <div class="progress" style="height: 25px;">
        <div class="progress-bar bg-success" role="progressbar" style="width: 60%;">60%</div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
</body>
</html>
